<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 · Page Not Found · hiworld</title>
  <meta name="description" content="Page not found — redirecting to hiworld.uk" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=1" />
  <!-- Outfit ExtraBold: matches the site wordmark -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Base ── */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      font-size: 16px;
      background-color: #f5f5f7;
      color: #1a1a1a;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-wrap: break-word;
      word-break: break-word;
    }

    /* ── Logo — CSS wordmark ── */
    #logo {
      position: fixed;
      top: 18px;
      left: 20px;
      z-index: 9999;
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      outline: none;
      border: none;
      -webkit-tap-highlight-color: transparent;
      font-family: 'Outfit', -apple-system, "Helvetica Neue", sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.4px;
      line-height: 1;
      user-select: none;
      transition: opacity 0.2s;
    }
    #logo:hover { opacity: 0.78; }
    #logo .logo-hi    { color: #00C2B3; }
    #logo .logo-world { color: #1a1a1a; }

    /* ── Content card ── */
    #content {
      margin-top: 80px;
      margin-left: auto;
      margin-right: auto;
      width: 90%;
      max-width: 800px;
      padding: 30px;
      background-color: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(15, 23, 42, 0.05);
      box-shadow: 0 14px 40px rgba(15, 23, 42, 0.06);
      border-radius: 24px;
      margin-bottom: 30px;
    }

    /* ── Headings ── */
    h1, h2, h3 {
      position: relative;
      padding-left: 15px;
      font-weight: bold;
      line-height: 1.2;
      color: #1a1a1a;
    }
    h1::before {
      content: "";
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 4px; height: 26px;
      background-color: #00C2B3;
      border-radius: 2px;
    }
    h1 { font-size: 32px; margin-top: 0; }
    h2 { font-size: 24px; margin-top: 35px; }

    /* ── Body text & links ── */
    p {
      line-height: 1.7;
      margin-top: 10px;
      margin-bottom: 16px;
      color: #333;
    }
    a { color: #008F84; text-decoration: none; transition: opacity 0.2s; }
    a:hover { opacity: 0.7; }

    /* ── Breadcrumb ── */
    .breadcrumb {
      font-size: 13px;
      color: #999;
      padding-left: 15px;
      margin-bottom: 20px;
      display: block;
    }
    .breadcrumb a { color: #008F84; }

    /* ── 404 number ── */
    .error-code {
      font-size: 96px;
      font-weight: 700;
      color: #00C2B3;
      line-height: 1;
      padding-left: 15px;
      margin: 0 0 8px;
      letter-spacing: -2px;
    }

    /* ── Redirect bar ── */
    .redirect-bar {
      margin-top: 28px;
      padding: 14px 18px;
      background: #f9fefe;
      border-left: 3px solid rgba(0, 194, 179, 0.5);
      border-radius: 0 8px 8px 0;
      font-size: 14px;
      color: #555;
    }
    .redirect-bar a { font-weight: 600; }

    #countdown {
      font-weight: 700;
      color: #00a396;
    }

    /* ── Button ── */
    .go-btn {
      display: inline-block;
      margin-top: 22px;
      padding: 10px 26px;
      background-color: #00C2B3;
      color: #fff !important;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .go-btn:hover { opacity: 0.85; }

    /* ── Footer ── */
    #footer {
      text-align: center;
      margin-top: 10px;
      padding: 20px;
      font-size: 12px;
      color: #999;
    }
    #footer a { color: #008F84; }

    /* ── Responsive ── */
    @media (max-width: 1150px) {
      #logo { position: absolute !important; top: 14px; left: 16px; font-size: 20px; }
      #content { margin-top: 60px; padding: 30px 25px; }
    }
    @media (max-width: 767px) {
      #logo { font-size: 19px; }
      #content { margin-top: 56px; padding: 25px 18px; border-radius: 20px; }
      .error-code { font-size: 72px; }
      h1 { font-size: 26px; }
    }
  </style>
</head>
<body>

  <a href="https://hiworld.uk/" id="logo" aria-label="hiworld home">
    <span class="logo-hi">hi</span><span class="logo-world">world</span>
  </a>

  <div id="content">

    <span class="breadcrumb">
      <a href="https://hiworld.uk/">hiworld</a> / 404
    </span>

    <p class="error-code">404</p>
    <h1>Page not found</h1>

    <p>The page you're looking for doesn't exist or has been moved.</p>

    <div class="redirect-bar">
      Redirecting to <a href="https://hiworld.uk/">hiworld.uk</a> in
      <span id="countdown">5</span> seconds
    </div>

    <a href="https://hiworld.uk/" class="go-btn">Go to hiworld.uk</a>

  </div>

  <div id="footer">
    © 2026 hiworld · All rights reserved. ·
    <a href="https://hiworld.uk/">hiworld.uk</a>
  </div>

  <script>
    (function () {
      var n = 5;
      var el = document.getElementById('countdown');
      var timer = setInterval(function () {
        n -= 1;
        if (el) el.textContent = n;
        if (n <= 0) {
          clearInterval(timer);
          window.location.href = 'https://hiworld.uk/';
        }
      }, 1000);
    })();
  </script>

</body>
</html>
